name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '2.7'
    
    - name: Install dependencies
      run: |
        gem install bundler
        bundle install || true
    
    - name: Run tests
      run: |
        echo "Running tests..."
        # Добавьте сюда ваши команды для тестов
        # Например: rake test
        # Или: rspec spec
