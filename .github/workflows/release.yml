name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libgtest-dev
    
    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON
    
    - name: Build
      run: cmake --build _build
    
    - name: Run tests
      run: ctest --test-dir _build --output-on-failure

  create-packages:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential rpm
    
    - name: Configure CMake for packaging
      run: cmake -H. -B_build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build project
      run: cmake --build _build
    
    - name: Build DEB package
      run: |
        cd _build
        cpack -G DEB || true
    
    - name: Build RPM package
      run: |
        cd _build
        cpack -G RPM || true
    
    - name: Build TGZ archive
      run: |
        cd _build
        cpack -G TGZ || true
    
    - name: Upload packages to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.tar.gz
          _build/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
